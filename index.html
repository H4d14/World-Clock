<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a City...</option>
        <option value="">Londan</option>
        <option value="">New york</option>
        <option value="">Auckland</option>
      </select>

      <div class="city" id="los-angeles">
        <h2>Los Angeles</h2>
        <div class="date"></div>
        <div class="time"></div>
      </div>

      <div class="city" id="paris">
        <h2>Paris</h2>
        <div class="date"></div>
        <div class="time"></div>
      </div>
    </div>
    <footer>
      This project was coded by <strong>Hadia Amin</strong> and is
      <a href="https://github.com/H4d14/World-Clock" target="_blank"
        >open sourced on Github</a
      >.
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
