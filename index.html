    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>

        <h2>Paris</h2>
        <div class="time">1:29:00 <small>AM</small></div>
      </div>

    </div>
